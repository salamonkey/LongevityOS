- active_slice_state
- active_milestone
- customer_review_tenant_id
- database_url_example
- owner_role
- slice_id
- slice_title
db:
  required_files:
  - supabase/config.toml
  - supabase/seed.sql
  - .env.example
  - package.json
  required_env_keys:
  - DATABASE_URL
  required_package_scripts:
    fabric: ./fabric/company/v1/fabric
    db:init: npm run fabric -- db:init --target .
    db:check: npm run fabric -- db:check --target .
    db:reset: npm run fabric -- db:reset --target . --yes
    db:migrate:status: supabase migration list
    db:migrate:deploy: supabase db push
  reset_command: supabase db reset
drift_exemptions:
- docs/product/product-system-framing.md
- .system/project-manifest.yaml
- docs/product/backlog.yaml
- docs/product/current-slice.yaml
- docs/reviews/product-manager/bootstrap-foundation-review.md
- docs/reviews/product-manager/bootstrap-backlog-slice-review.md
- docs/architecture/baseline.md
